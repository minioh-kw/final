version: "3.9"

services:
  back:
    build: ./back
    container_name: music-rec-back
    ports:
      - "8000:8000"
    networks:
      - music-net
    restart: unless-stopped

  front:
    build: ./front
    container_name: music-rec-front
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://back:8000
    depends_on:
      - back
    networks:
      - music-net
    restart: unless-stopped

networks:
  music-net:
    driver: bridge
